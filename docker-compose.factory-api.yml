services:
  factory-api:
    build:
      context: .
      dockerfile: Dockerfile.factory-api
    container_name: factory-api
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
      - ${CODEX_HOME_HOST_PATH:-$HOME/.codex}:/root/.codex
    environment:
      - FACTORY_API_ADDR=:8080
      - ATTRACTOR_AGENT_BACKEND=${ATTRACTOR_AGENT_BACKEND:-codex}
      - ATTRACTOR_CODEX_PATH=${ATTRACTOR_CODEX_PATH:-/usr/local/bin/codex}
      - ATTRACTOR_CODEX_DISABLE_MCP=${ATTRACTOR_CODEX_DISABLE_MCP:-true}
      - ATTRACTOR_CODEX_SANDBOX=${ATTRACTOR_CODEX_SANDBOX:-workspace-write}
      - ATTRACTOR_CODEX_APPROVAL=${ATTRACTOR_CODEX_APPROVAL:-never}
      - ATTRACTOR_CODEX_SKIP_GIT_REPO_CHECK=${ATTRACTOR_CODEX_SKIP_GIT_REPO_CHECK:-true}
      - FACTORY_LOG_CODEX_STREAM=${FACTORY_LOG_CODEX_STREAM:-1}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
